<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Session</title>
<style>
body{font-family:Arial;background:#f4f6fb}
.container{max-width:400px;margin:60px auto;background:white;padding:20px;border-radius:12px}
input,button{width:100%;padding:10px;margin-top:10px}
button{background:#1E88E5;color:white;border:none;border-radius:8px}
</style>
</head>

<body>
<div class="container">
<h2>📅 Book Session</h2>

<form method="POST">
<label>Date</label>
<input type="date" name="session_date" required>

<label>Time</label>
<input type="time" name="session_time" required>

<button type="submit">Confirm Booking</button>
</form>

</div>
</body>
</html>
