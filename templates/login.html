<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - Smart Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #42A5F5, #1E88E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 50px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            width: 420px;
            transition: 0.4s;
        }

        .login-box:hover {
            transform: translateY(-8px);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }

        .note {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        input,
        button {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #1E88E5;
            outline: none;
            box-shadow: 0 0 10px rgba(30, 136, 229, 0.3);
        }

        button {
            background: #1E88E5;
            color: white;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: #1565C0;
            transform: scale(1.03);
        }

        .flash {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .danger {
            background: #ffebee;
            color: #c62828;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .info {
            background: #e3f2fd;
            color: #1565c0;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #1565C0;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>
        <p class="note">Accounts are created by admin only</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if prompt_onboarding %}
        <div style="text-align:center; margin-top: 10px;">
            <a href="{{ url_for('student_onboarding') }}"
                style="display:inline-block; background:#f9fafb; border:1px solid #cbd5e1; color:#1e293b; padding:10px 16px; border-radius:8px; font-weight:700; margin-bottom:8px;">
                تحديث التفضيلات الآن
            </a>
        </div>
        {% endif %}

        <a href="{{ url_for('home') }}">Back to Home</a>
    </div>
</body>

</html>
