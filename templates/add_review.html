<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Review - Smart Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body { font-family:'Roboto',sans-serif; background:#f0f2f7; margin:0; padding:0; }
header { background:#1E88E5; color:white; padding:15px 50px; display:flex; justify-content: space-between; align-items:center; }
header h1 { font-size:26px; cursor:pointer; }
header nav a { color:white; text-decoration:none; margin-left:25px; font-weight:500; transition:0.3s; }
header nav a:hover { color:#BBDEFB; }
form { max-width:500px; margin:50px auto; background:white; padding:25px 20px; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,0.15); }
form h2 { margin-bottom:20px; text-align:center; }
form label { display:block; margin:10px 0 5px; }
form input, form textarea, form select { width:100%; padding:10px; border-radius:6px; border:1px solid #ccc; margin-bottom:15px; }
form button { background:#1E88E5; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:500; }
form button:hover { background:#1565C0; }
</style>
</head>
<body>
<header>
<h1>Smart Tutor</h1>
<nav>
<a href="{{ url_for('dashboard') }}">Dashboard</a>
<a href="{{ url_for('tutors') }}">All Tutors</a>
<a href="{{ url_for('logout') }}">Logout</a>
</nav>
</header>

<form method="post">
<h2>Add Review</h2>
<label for="rating">Rating (1-5):</label>
<select name="rating" id="rating" required>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<label for="comment">Comment:</label>
<textarea name="comment" id="comment" rows="4" required></textarea>

<button type="submit">Submit Review</button>
</form>
</body>
</html>
