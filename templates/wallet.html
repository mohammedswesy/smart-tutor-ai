<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المحفظة | Smart Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        .balance-icon { width: 80px; height: 80px; background: #dcfce7; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; }
        h1 { color: #1e293b; margin-bottom: 10px; }
        .amount { font-size: 3rem; font-weight: bold; color: #6366f1; margin: 20px 0; }
        .btn-back { display: inline-block; padding: 12px 25px; background: #6366f1; color: white; text-decoration: none; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="balance-icon"><i class="fas fa-wallet"></i></div>
        <h1>رصيدك الحالي</h1>
        <div class="amount">{{ balance }} ₪</div>
        <p style="color: #64748b;">مجموع أرباحك من الحصص المكتملة</p>
        <br>
        <a href="{{ url_for('dashboard') }}" class="btn-back">العودة للرئيسية</a>
    </div>
</body>
</html>
